<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arunkumar P S · Skypass Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== EDIT BRAND COLOURS HERE ===== */
  :root{--red:#cf2230;--red-deep:#9c1721;--ink:#13213d;--ink-soft:rgba(19,33,61,.64);--ink-faint:rgba(19,33,61,.46);--glass-2:rgba(255,255,255,.40);--hair:rgba(255,255,255,.65)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);min-height:100dvh;display:flex;align-items:center;justify-content:center;
    padding:28px 18px calc(28px + env(safe-area-inset-bottom));
    background:radial-gradient(130% 90% at 50% -15%,#3257bf 0%,#1c397f 34%,#0c1c41 66%,#070f25 100%);overflow-x:hidden;position:relative}
  .bloom{position:fixed;border-radius:50%;filter:blur(70px);opacity:.55;z-index:0;pointer-events:none}
  .bloom.red{width:42vmax;height:42vmax;right:-12vmax;top:-10vmax;background:radial-gradient(circle,#ff4d3d,transparent 65%);animation:drift1 16s ease-in-out infinite}
  .bloom.cyan{width:46vmax;height:46vmax;left:-14vmax;bottom:-14vmax;background:radial-gradient(circle,#33b6ff,transparent 65%);animation:drift2 19s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-4vmax,4vmax)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(5vmax,-3vmax)}}
  .card{position:relative;z-index:1;width:100%;max-width:392px;background:linear-gradient(150deg,rgba(255,255,255,.58),rgba(255,255,255,.34));
    backdrop-filter:blur(34px) saturate(185%);-webkit-backdrop-filter:blur(34px) saturate(185%);border:1px solid var(--hair);border-radius:34px;
    box-shadow:0 28px 70px rgba(4,10,28,.46),inset 0 1px 0 rgba(255,255,255,.85),inset 0 -1px 0 rgba(255,255,255,.18);padding:0 24px 24px;overflow:hidden;animation:rise .8s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
  .header{margin:0 -24px 0;padding:28px 26px 30px;text-align:center;position:relative;z-index:2;border-radius:34px 34px 0 0;border-bottom:2px solid var(--red);background:#ffffff}
  .header img{height:62px;max-width:82%;object-fit:contain;display:inline-block}
  .avatar-wrap{display:flex;justify-content:center;margin:-14px 0 14px;position:relative;z-index:3}
  .avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.92);box-shadow:0 12px 30px rgba(4,10,28,.42),0 0 0 5px rgba(207,34,48,.18)}
  .name{font-family:'Sora',sans-serif;font-weight:700;font-size:27px;text-align:center;letter-spacing:-.01em;position:relative;z-index:2}
  .role{text-align:center;margin-top:4px;font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);position:relative;z-index:2}
  .org{text-align:center;margin-top:2px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);position:relative;z-index:2}
  .rows{position:relative;z-index:2;margin-top:18px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--ink);background:var(--glass-2);border:1px solid rgba(255,255,255,.5);border-radius:15px;padding:11px 13px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6);transition:transform .15s ease,background .15s ease}
  .row:active{transform:scale(.985)}
  @media(hover:hover){.row:hover{background:rgba(255,255,255,.6)}}
  .ic{width:36px;height:36px;flex:none;display:grid;place-items:center;border-radius:11px;background:linear-gradient(150deg,#fff,#ffe5e7);box-shadow:0 4px 10px rgba(207,34,48,.16)}
  .ic svg{width:18px;height:18px;stroke:var(--red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .row .meta{display:flex;flex-direction:column;min-width:0}
  .row .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .row .v{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .save{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:18px;width:100%;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600;font-size:15.5px;color:#fff;padding:15px;border:none;border-radius:16px;overflow:hidden;background:linear-gradient(150deg,#e0303c,var(--red-deep));box-shadow:0 12px 26px rgba(156,23,33,.42),inset 0 1px 0 rgba(255,255,255,.4);transition:transform .15s ease}
  .save::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);transform:translateX(-120%);transition:transform .6s ease}
  .save:hover{transform:translateY(-1px)} .save:hover::after{transform:translateX(120%)}
  .save svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .foot{position:relative;z-index:2;text-align:center;margin-top:16px;font-size:10px;letter-spacing:.22em;color:var(--ink-faint);text-transform:uppercase}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head>

<script>
(function(){
  function digits(s){return (s||'').replace(/[^\d+]/g,'');}
  function val(t){var e=document.querySelector('.row[data-type="'+t+'"] .v');return e?e.textContent.trim():'';}
  document.querySelectorAll('.row').forEach(function(r){
    var t=r.getAttribute('data-type'), v=(r.querySelector('.v')||{}).textContent||'';
    if(t==='mobile'||t==='office'){r.setAttribute('href','tel:'+digits(v));}
    else if(t==='email'){r.setAttribute('href','mailto:'+v.trim());}
    else if(t==='web'){var w=v.trim();r.setAttribute('href',/^https?:/.test(w)?w:'https://'+w);r.target='_blank';r.rel='noopener';}
    else if(t==='address'){var q=r.getAttribute('data-map')||v;r.setAttribute('href','https://maps.google.com/?q='+encodeURIComponent(q));r.target='_blank';r.rel='noopener';}
  });
  function buildVCF(){
    var name=document.querySelector('.name').textContent.trim();
    var p=name.split(' '),first=p.shift(),last=p.join(' ');
    var title=document.querySelector('.role').textContent.trim();
    var org=document.querySelector('.org').textContent.trim();
    var web=val('web'); if(web&&!/^https?:/.test(web)) web='https://'+web;
    var adrEl=document.querySelector('.row[data-type="address"]');
    var adr=adrEl?(adrEl.getAttribute('data-adr')||''):'';
    var src=document.querySelector('.avatar').src, pb=src.indexOf(',')>=0?src.split(',')[1]:'';
    var pl='PHOTO;ENCODING=b;TYPE=JPEG:'+pb, folded=[pl.slice(0,75)];
    for(var i=75;i<pl.length;i+=74) folded.push(' '+pl.slice(i,i+74));
    var lines=['BEGIN:VCARD','VERSION:3.0','N:'+last+';'+first+';;;','FN:'+name,'ORG:'+org,'TITLE:'+title];
    document.querySelectorAll('.row[data-type="mobile"] .v').forEach(function(e){var d=digits(e.textContent);if(d)lines.push('TEL;TYPE=CELL,VOICE:'+d);});
    if(val('office')) lines.push('TEL;TYPE=WORK,VOICE:'+digits(val('office')));
    if(val('email')) lines.push('EMAIL;TYPE=WORK,INTERNET:'+val('email'));
    if(web) lines.push('URL:'+web);
    if(adr) lines.push('ADR;TYPE=WORK:;;'+adr);
    lines=lines.concat(folded).concat(['END:VCARD']);
    return lines.join('\r\n')+'\r\n';
  }
  window.saveContact=function(){
    var vcf=buildVCF(), blob=new Blob([vcf],{type:'text/vcard;charset=utf-8'}), url=URL.createObjectURL(blob);
    var ua=navigator.userAgent||'', isApple=/iP(hone|ad|od)/.test(ua)||(/Macintosh/.test(ua)&&navigator.maxTouchPoints>1);
    if(isApple){window.location.href=url;}
    else{var a=document.createElement('a');a.href=url;a.download=document.querySelector('.name').textContent.trim().replace(/\s+/g,'_')+'.vcf';document.body.appendChild(a);a.click();a.remove();}
    setTimeout(function(){URL.revokeObjectURL(url);},15000);
  };
})();
</script>
